name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-progress runs when a new push comes in to the same branch.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Compile-level CI using a CUDA-enabled container.
  # No GPU is needed for `cargo check` — the host compilation succeeds as long as
  # nvcc exists. Actual test execution requires a real CUDA device; that happens
  # on the self-hosted runner job (gated on a label so it only runs when available).
  compile-check:
    name: cargo check (CUDA toolkit)
    runs-on: ubuntu-latest
    container:
      image: nvidia/cuda:12.4.1-devel-ubuntu22.04
    steps:
      - name: Install build deps
        run: |
          apt-get update
          apt-get install -y curl build-essential pkg-config git
      - uses: actions/checkout@v4
      - name: Install Rust nightly
        run: |
          curl --proto "=https" --tlsv1.2 -sSf https://sh.rustup.rs | \
              sh -s -- -y --default-toolchain nightly --profile minimal --component clippy,rustfmt
          . "$HOME/.cargo/env"
          rustc --version
      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - name: cargo check --lib
        run: |
          . "$HOME/.cargo/env"
          export PATH="/usr/local/cuda/bin:$PATH"
          cargo check --lib

  # Clippy + fmt — run without CUDA (only touches Rust sources; not the .cu files).
  # Uses the no-cuda-build feature once we gate build.rs on it; for now this job
  # is a placeholder.
  # fmt:
  #   name: cargo fmt
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v4
  #     - name: Install Rust nightly + rustfmt
  #       run: |
  #         curl --proto "=https" --tlsv1.2 -sSf https://sh.rustup.rs | \
  #             sh -s -- -y --default-toolchain nightly --profile minimal --component rustfmt
  #         . "$HOME/.cargo/env"
  #     - name: cargo fmt --all --check
  #       run: |
  #         . "$HOME/.cargo/env"
  #         cargo fmt --all -- --check

  # Full test suite — gated on a `gpu-ci` label so it only runs when a
  # self-hosted runner with an RTX 5090 is available. To enable:
  #   1. Register a self-hosted runner (see reference_github_runner.md pattern)
  #      with labels: self-hosted, gpu, rtx5090
  #   2. Uncomment this job
