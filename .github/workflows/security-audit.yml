name: Security Audit

on:
  schedule:
    # Weekly — every Monday 06:00 UTC
    - cron: "0 6 * * 1"
  push:
    branches: [main]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/security-audit.yml"
  workflow_dispatch:

jobs:
  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install rustup nightly toolchain
        run: |
          rustup toolchain install nightly --profile minimal
          rustup default nightly
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Run cargo audit
        # Ignored advisories:
        #   RUSTSEC-2026-0097 — rand 0.9.2 "unsound with custom logger via
        #   rand::rng()". Upstream bug not fixed in a released version as of
        #   2026-04-23. We don't install a custom logger, so the unsound path
        #   is not reachable in VortexSTARK. Revisit when rand ships a fix.
        run: cargo audit --ignore RUSTSEC-2026-0097
